<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squawk 77</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
  }

  .screen {
    text-align: center;
    animation: blink 1.1s step-start infinite;
  }

  .code {
    font-size: clamp(5rem, 25vw, 12rem);
    font-weight: bold;
    color: #ff2020;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .label {
    font-size: clamp(0.9rem, 3vw, 1.4rem);
    color: #ff2020;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 1rem;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="code">7700</div>
    <div class="label">Squawking off</div>
  </div>
</body>
</html>
